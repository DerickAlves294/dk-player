<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta http-equiv="Content-Security-Policy" content="default-src 'self' dkmedia:; img-src 'self' dkmedia: blob: data:; media-src 'self' dkmedia: blob:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; script-src 'self'; connect-src 'self' ws: wss:;">
<title>DK Player</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>


<div id="app">
  <aside class="sidebar">
    <div class="brand">
      <svg class="disc" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="14.5" fill="#1C2027" stroke="var(--accent)" stroke-width="1.5"/><circle cx="16" cy="16" r="5" fill="var(--accent)"/><circle cx="16" cy="16" r="1.6" fill="#0B0D10"/></svg>
      <span>DK Player</span>
    </div>
    <nav class="nav">
      <button class="nav-item" data-view="all">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        Todas as músicas
      </button>
      <button class="nav-item" data-view="artists">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Artistas
      </button>
      <button class="nav-item" data-view="albums">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
        Álbuns
      </button>
    </nav>
    <div style="display:flex;flex-direction:column;min-height:0;flex:1;">
      <div class="nav-section-title">Playlists</div>
      <div class="playlist-nav-list" id="playlistNavList"></div>
      <button class="new-playlist-btn" id="newPlaylistBtn">
        <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        Nova playlist
      </button>
      <div class="sidebar-library-status">
        <div class="status-pill" id="statusPill"><span class="status-dot"></span><span id="statusText">Nenhuma pasta selecionada</span></div>
        <button class="sidebar-change-folder-btn" id="changeFolderBtn" style="display:none;">Trocar pasta</button>
      </div>
    </div>
    <div class="sidebar-footer">
      <div class="sidebar-version" id="sidebarVersionTag">v1.0.1</div>
      <div class="sidebar-dev">Desenvolvido por <strong>Dérick Alves</strong></div>
      <button class="sidebar-about-btn" id="aboutBtn">Sobre o DK Player</button>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="searchInput" type="text" placeholder="Buscar por música, artista ou álbum" />
      </div>
      <div class="spacer"></div>
      <div id="partyStatusRoot"></div>
      <button class="btn btn-ghost party-btn" id="partyBtn" style="font-size:12.5px;">Ouvir Junto</button>
      <button class="add-btn" id="addMusicBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M12 5v14M5 12h14"/></svg>
        Adicionar músicas
      </button>
    </div>
    <div class="content" id="content"></div>
  </div>

  <div class="miniplayer" id="miniplayer" style="display:none;">
    <div class="mp-track" id="mpTrackInfo">
      <div class="mp-art" id="mpArt"></div>
      <div class="mp-meta">
        <div class="mp-title" id="mpTitle">—</div>
        <div class="mp-artist" id="mpArtist">—</div>
      </div>
    </div>
    <div class="mp-center">
      <div class="mp-controls">
        <button class="ctrl-btn" id="shuffleBtn" title="Modo aleatório">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg>
        </button>
        <button class="ctrl-btn" id="prevBtn" title="Anterior">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button class="play-btn-main" id="playBtn" title="Reproduzir">
          <svg id="playIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <button class="ctrl-btn" id="nextBtn" title="Próxima">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zM6 6l8.5 6L6 18z"/></svg>
        </button>
        <button class="ctrl-btn" id="repeatBtn" title="Repetir">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m17 2 4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 22l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3"/></svg>
        </button>
      </div>
      <div class="mp-progress">
        <span class="mp-time mono" id="curTime">0:00</span>
        <div class="seek-bar" id="seekBar"><div class="seek-fill" id="seekFill"></div><div class="seek-handle" id="seekHandle"></div></div>
        <span class="mp-time mono right" id="durTime">0:00</span>
      </div>
    </div>
    <div class="mp-right">
      <button class="ctrl-btn" id="queueBtn" title="Fila de reprodução">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h11M3 12h11M3 18h7"/><path d="m17 8 4 4-4 4"/></svg>
      </button>
      <div class="volume-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="vol-icon-btn" style="color:var(--text-dim);flex-shrink:0;" id="volIcon" title="Silenciar"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/></svg>
        <div class="seek-bar" id="volBar"><div class="seek-fill" id="volFill"></div><div class="seek-handle" id="volHandle"></div></div>
      </div>
      <button class="ctrl-btn" id="closePlayerBtn" title="Parar e fechar o player">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
  </div>
</div>

<!-- Full screen player -->
<div class="overlay" id="fullOverlay">
  <button class="fp-close" id="fpClose"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
  <div class="full-player">
    <div class="fp-art-wrap" id="fpArtWrap"><div class="fp-art" id="fpArt"></div></div>
    <div class="fp-meta">
      <div class="fp-title" id="fpTitle">—</div>
      <div class="fp-artist" id="fpArtist">—</div>
    </div>
    <div class="fp-progress">
      <span class="mp-time mono" id="fpCurTime">0:00</span>
      <div class="seek-bar" id="fpSeekBar" style="flex:1;"><div class="seek-fill" id="fpSeekFill"></div><div class="seek-handle" id="fpSeekHandle"></div></div>
      <span class="mp-time mono right" id="fpDurTime">0:00</span>
    </div>
    <div class="fp-controls">
      <button class="ctrl-btn" id="fpShuffleBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/><line x1="4" y1="4" x2="9" y2="9"/></svg></button>
      <button class="ctrl-btn" id="fpPrevBtn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg></button>
      <button class="fp-play" id="fpPlayBtn"><svg id="fpPlayIcon" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
      <button class="ctrl-btn" id="fpNextBtn"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 6h2v12h-2zM6 6l8.5 6L6 18z"/></svg></button>
      <button class="ctrl-btn" id="fpRepeatBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m17 2 4 4-4 4M3 11V9a4 4 0 0 1 4-4h14M7 22l-4-4 4-4M21 13v2a4 4 0 0 1-4 4H3"/></svg></button>
    </div>
    <div class="fp-bottom-row">
      <button class="ctrl-btn" id="fpQueueBtn" title="Fila"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h11M3 12h11M3 18h7"/><path d="m17 8 4 4-4 4"/></svg></button>
      <div class="volume-wrap">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="vol-icon-btn" style="color:var(--text-dim);flex-shrink:0;" id="fpVolIcon" title="Silenciar"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/></svg>
        <div class="seek-bar" id="fpVolBar"><div class="seek-fill" id="fpVolFill"></div><div class="seek-handle" id="fpVolHandle"></div></div>
      </div>
    </div>
  </div>
</div>

<!-- Queue panel -->
<div class="queue-panel" id="queuePanel">
  <div class="queue-header">
    <h3>Fila de reprodução</h3>
    <div class="queue-header-actions">
      <button id="queueClearBtn" class="queue-clear-btn" title="Limpar fila">Limpar</button>
      <button id="queueCloseBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>
  </div>
  <div class="queue-list" id="queueList"></div>
</div>

<!-- Sobre (tela cheia) -->
<div class="about-screen" id="aboutScreen">
  <button class="about-back-btn" id="aboutBackBtn" title="Voltar (Esc)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
  </button>
  <div class="about-screen-content">
    <div class="about-screen-icon">
      <svg viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="14.5" fill="#1C2027" stroke="currentColor" stroke-width="1.5"/><circle cx="16" cy="16" r="5" fill="currentColor"/><circle cx="16" cy="16" r="1.6" fill="#0B0D10"/></svg>
    </div>
    <div class="about-screen-name" id="aboutScreenName">DK Player</div>
    <div class="about-screen-sub">Desenvolvido por <strong>Dérick Alves</strong></div>
    <div class="about-screen-changelog" id="aboutScreenChangelog"></div>
    <div class="about-screen-bottom-spacer"></div>
  </div>
</div>

<div id="modalRoot"></div>
<div id="ctxRoot"></div>
<div id="toastRoot" style="position:fixed;bottom:96px;left:50%;transform:translateX(-50%);z-index:300;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;"></div>

<audio id="audio" preload="metadata" crossorigin="anonymous"></audio>

<script src="app.js"></script>
<script src="sync.js"></script>
</body>
</html>
